# Standalone packaging for the lightweight `oicc` sub-package.
#
# The main project (civicsafe) ships a heavy torch/torch-geometric stack. The
# `oicc` method itself depends ONLY on numpy + scipy (torch is used solely by the
# optional US real-data loader). To distribute `oicc` on its own:
#
#     cp pyproject-oicc.toml /tmp/oicc-dist/pyproject.toml
#     cp -r src/oicc /tmp/oicc-dist/src/oicc
#     cd /tmp/oicc-dist && pip install .
#
# It is deliberately kept installable with a minimal footprint.

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "oicc"
version = "0.3.0"
description = "Over-Identification-Calibrated Conformal Deconvolution: honest multi-channel latent-rate estimation with a testable-independence specification test, two-interval conformal coverage, proximal common-mode point-identification, and an anytime-valid drift monitor."
readme = "src/oicc/README.md"
license = {text = "MIT"}
requires-python = ">=3.11"
authors = [{name = "OICC authors"}]
keywords = [
    "conformal-prediction", "measurement-error", "deconvolution",
    "negative-controls", "proximal-inference", "anytime-valid",
    "latent-variable", "crime-statistics", "fairness",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Mathematics",
]
dependencies = [
    "numpy>=1.26,<3.0",
    "scipy>=1.12,<2.0",
]

[project.optional-dependencies]
# US real-data loader (torch panels) and figure generation.
extras = ["torch>=2.2", "matplotlib>=3.7", "pandas>=2.0"]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["oicc*"]
